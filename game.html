<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Battle Royale</title>
    <style>
        /* GLOBAL STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #050510 0%, #1a001a 100%);
            color: #00ffff;
            overflow: hidden;
            height: 100vh;
            touch-action: manipulation;
        }

        /* GLASSMORPHISM UI */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.1);
        }

        /* SCREEN TRANSITIONS */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        /* LOADING SCREEN */
        .loading-bar {
            width: 300px;
            height: 8px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            width: 0%;
            border-radius: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* LOBBY SCREEN */
        .logo {
            font-size: 3em;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 40px;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px #00ffff); }
            to { filter: drop-shadow(0 0 30px #ff00ff); }
        }

        .input-field {
            width: 280px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 15px;
            color: #00ffff;
            font-size: 1.1em;
            margin: 15px 0;
            text-align: center;
        }

        .input-field:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00ffff, #0080ff);
            color: #000;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
        }

        .btn-primary:hover, .btn-primary:active {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.6);
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff4444, #ff0066);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #ff00ff, #aa00ff);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 0, 255, 0.4);
        }

        /* GAME UI */
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #050510 70%);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .game-ui {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        .top-ui {
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: auto;
        }

        .bottom-ui {
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }

        .health-bar, .ammo-bar {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc66);
            transition: width 0.3s ease;
        }

        .ammo-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffaa00, #ff8800);
            transition: width 0.1s ease;
        }

        .stats {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 120px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            display: block;
            text-shadow: 0 0 10px currentColor;
        }

        /* JOYSTICK */
        .joystick {
            position: absolute;
            width: 120px;
            height: 120px;
            bottom: 100px;
            left: 40px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.2);
            border: 4px solid rgba(0, 255, 255, 0.4);
            touch-action: none;
            pointer-events: auto;
        }

        .joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #00ffff, #0080ff);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        .shoot-btn {
            position: absolute;
            width: 100px;
            height: 100px;
            bottom: 100px;
            right: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff4444, #ff0066);
            border: 4px solid rgba(255, 68, 68, 0.6);
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            pointer-events: auto;
            box-shadow: 0 8px 25px rgba(255, 68, 68, 0.4);
            transition: all 0.2s ease;
        }

        .shoot-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.6);
        }

        /* CROSSHAIR */
        .crosshair {
            position: absolute;
            width: 30px;
            height: 30px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 255, 0.8);
        }

        .crosshair::before {
            width: 2px;
            height: 30px;
            left: 14px;
            top: 0;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .crosshair::after {
            width: 30px;
            height: 2px;
            top: 14px;
            left: 0;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        /* GAME OVER SCREEN */
        .score-display {
            font-size: 4em;
            margin: 20px 0;
            text-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loadingScreen" class="screen active">
        <div class="glass-panel" style="padding: 60px 40px; text-align: center;">
            <div class="logo">NEON</div>
            <div class="logo" style="font-size: 1.5em; margin-top: -20px;">BATTLE ROYALE</div>
            <div class="loading-bar">
                <div class="loading-progress" id="loadingProgress"></div>
            </div>
            <div style="margin-top: 20px; font-size: 1.1em;">Initializing battle systems...</div>
        </div>
    </div>

    <!-- LOBBY SCREEN -->
    <div id="lobbyScreen" class="screen">
        <div class="glass-panel" style="padding: 60px 40px; text-align: center; max-width: 400px;">
            <div class="logo" style="margin-bottom: 30px;">NEON BATTLE ROYALE</div>
            
            <div style="margin-bottom: 30px;">
                <div style="font-size: 1.3em; margin-bottom: 10px;">Player Name</div>
                <input type="text" id="playerName" class="input-field" placeholder="Enter your name" maxlength="12" value="NeonKiller">
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap;">
                <div class="glass-panel" style="padding: 20px; min-width: 100px;">
                    <div style="font-size: 2em; color: #ffaa00;">💰</div>
                    <div style="font-size: 1.5em;">1250</div>
                </div>
                <div class="glass-panel" style="padding: 20px; min-width: 100px;">
                    <div style="font-size: 2em; color: #00ff88;">⚡</div>
                    <div style="font-size: 1.5em;">Level 7</div>
                </div>
            </div>

            <div style="margin-bottom: 25px;">
                <button class="btn btn-primary" style="width: 220px;" onclick="startGame()">BATTLE ROYALE SOLO</button>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <div id="gameContainer">
            <canvas id="gameCanvas"></canvas>
            
            <!-- TOP UI -->
            <div class="game-ui top-ui">
                <div class="health-bar">
                    <div class="health-fill" id="healthFill" style="width: 100%;"></div>
                </div>
                <div class="stats" style="color: #ff00ff;">
                    <span class="stat-number" id="killCount">0</span>
                    KILLS
                </div>
                <div class="stats" style="color: #00ff88;">
                    <span class="stat-number" id="timer">03:00</span>
                    TIME
                </div>
            </div>

            <!-- BOTTOM UI -->
            <div class="game-ui bottom-ui">
                <div class="stats" style="color: #ffaa00; margin-bottom: auto;">
                    <span class="stat-number" id="ammoCount">∞</span>
                    AMMO
                </div>
                <div class="joystick" id="joystick">
                    <div class="joystick-knob" id="joystickKnob"></div>
                </div>
                <div class="shoot-btn" id="shootBtn">🔥</div>
            </div>

            <!-- CROSSHAIR -->
            <div class="crosshair"></div>
        </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameOverScreen" class="screen">
        <div class="glass-panel" style="padding: 80px 60px; text-align: center; max-width: 500px;">
            <div class="logo" style="font-size: 2.5em; margin-bottom: 20px;">BATTLE ENDED</div>
            <div class="score-display" id="finalScore">0</div>
            <div style="font-size: 1.5em; margin: 30px 0; color: #ffaa00;">Final Score</div>
            <div style="margin-bottom: 40px;">
                <div style="font-size: 1.3em; margin-bottom: 10px;">KILLS: <span id="finalKills" style="color: #ff00ff;">0</span></div>
                <div style="font-size: 1.3em;">SURVIVAL: <span id="finalTime" style="color: #00ff88;">00:00</span></div>
            </div>
            <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                <button class="btn btn-primary" onclick="restartGame()" style="width: 180px;">PLAY AGAIN</button>
                <button class="btn btn-secondary" onclick="backToLobby()" style="width: 180px;">LOBBY</button>
            </div>
        </div>
    </div>

    <script>
        // ========================================
        // GAME STATE MANAGEMENT
        // ========================================
        const gameState = {
            currentScreen: 'loading',
            playerName: 'NeonKiller',
            gameTime: 180, // 3 minutes
            isGameRunning: false,
            gamePaused: false
        };

        // Game entities
        let player = {
            x: 400,
            y: 300,
            vx: 0,
            vy: 0,
            radius: 20,
            health: 100,
            maxHealth: 100,
            facingAngle: 0,
            lastMoveAngle: 0
        };

        let bullets = [];
        let enemies = [];
        let particles = [];
        let killCount = 0;
        let startTime = 0;

        // Canvas context
        let canvas, ctx;
        let gameWidth, gameHeight;

        // Input state
        let touchStart = { x: 0, y: 0 };
        let isShooting = false;
        let joystickActive = false;

        // Audio context for sound effects
        let audioCtx;

        // ========================================
        // SCREEN MANAGEMENT
        // ========================================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
            gameState.currentScreen = screenId.replace('Screen', '').toLowerCase();
        }

        function simulateLoading() {
            let progress = 0;
            const loadingInterval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 100;
                document.getElementById('loadingProgress').style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(loadingInterval);
                    setTimeout(() => showScreen('lobbyScreen'), 500);
                }
            }, 100);
        }

        // ========================================
        // LOBBY HANDLERS
        // ========================================
        function startGame() {
            gameState.playerName = document.getElementById('playerName').value || 'NeonKiller';
            showScreen('gameScreen');
            initGame();
        }

        function backToLobby() {
            showScreen('lobbyScreen');
            resetGame();
        }

        function restartGame() {
            initGame();
        }

        // ========================================
        // GAME INITIALIZATION
        // ========================================
        function initGame() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // Set canvas size
            function resizeCanvas() {
                gameWidth = window.innerWidth;
                gameHeight = window.innerHeight;
                canvas.width = gameWidth;
                canvas.height = gameHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Reset game state
            player = {
                x: gameWidth / 2,
                y: gameHeight / 2,
                vx: 0,
                vy: 0,
                radius: 25,
                health: 100,
                maxHealth: 100,
                facingAngle: 0,
                lastMoveAngle: 0
            };
            bullets = [];
            enemies = [];
            particles = [];
            killCount = 0;
            gameState.gameTime = 180;
            startTime = Date.now();
            gameState.isGameRunning = true;

            // Spawn initial enemies
            for (let i = 0; i < 8; i++) {
                spawnEnemy();
            }

            // Init audio
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            // Start game loop
            gameLoop();
            setupInputHandlers();
        }

        // ========================================
        // INPUT HANDLING (TOUCH + BUTTONS)
        // ========================================
        function setupInputHandlers() {
            const joystick = document.getElementById('joystick');
            const joystickKnob = document.getElementById('joystickKnob');
            const shootBtn = document.getElementById('shootBtn');

            // Joystick touch handling
            let joystickTouchId = null;

            joystick.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                joystickTouchId = touch.identifier;
                updateJoystick(touch.clientX, touch.clientY, joystickKnob);
                joystickActive = true;
            }, { passive: false });

            joystick.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (let touch of e.changedTouches) {
                    if (touch.identifier === joystickTouchId) {
                        updateJoystick(touch.clientX, touch.clientY, joystickKnob);
                        break;
                    }
                }
            }, { passive: false });

            joystick.addEventListener('touchend', (e) => {
                e.preventDefault();
                joystickActive = false;
                joystickKnob.style.transform = 'translate(-50%, -50%)';
                player.vx = 0;
                player.vy = 0;
            }, { passive: false });

            // Shoot button
            let shootTouchId = null;
            shootBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                shootTouchId = e.changedTouches[0].identifier;
                isShooting = true;
                shoot();
            }, { passive: false });

            shootBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                for (let touch of e.changedTouches) {
                    if (touch.identifier === shootTouchId) {
                        isShooting = false;
                        break;
                    }
                }
            }, { passive: false });

            // Keyboard support (desktop testing)
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    shoot();
                }
            });
        }
