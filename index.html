<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Battle Royale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: 'Courier New', monospace;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 70%);
            color: #00ff88;
            overflow: hidden;
            height: 100vh;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #001122 0%, #000011 50%, #000022 100%);
            touch-action: none;
        }

        /* Screen Styles */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            z-index: 100;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        .screen h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            margin-bottom: 2rem;
            text-shadow: 0 0 20px #00ff88;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #00ff88; }
            to { text-shadow: 0 0 40px #00ff88, 0 0 60px #00ff88; }
        }

        .input-group {
            margin-bottom: 2rem;
        }

        input {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            color: #00ff88;
            text-align: center;
            width: 80%;
            max-width: 300px;
            backdrop-filter: blur(10px);
        }

        input::placeholder {
            color: #44ffaa;
        }

        .btn {
            background: linear-gradient(45deg, #00ff88, #00cc66);
            border: none;
            border-radius: 15px;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            transition: all 0.2s ease;
            min-width: 200px;
            touch-action: manipulation;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
        }

        /* Game UI */
        #gameUI {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .hud {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid #00ff88;
            backdrop-filter: blur(10px);
            font-size: 1rem;
        }

        #healthBar {
            top: 20px;
            left: 20px;
        }

        #stats {
            top: 20px;
            right: 20px;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .crosshair-line {
            position: absolute;
            background: #00ff88;
            opacity: 0.6;
        }

        .crosshair-line.horizontal {
            width: 20px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .crosshair-line.vertical {
            width: 2px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Controls */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: grid;
            grid-template-areas: 
                ". up . shoot"
                "left down right shoot";
            grid-gap: 15px;
            pointer-events: auto;
            z-index: 75;
            max-width: 400px;
            margin: 0 auto;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            font-weight: bold;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            background: rgba(0, 255, 136, 0.4);
            transform: scale(0.9);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
        }

        #up { grid-area: up; }
        #down { grid-area: down; }
        #left { grid-area: left; }
        #right { grid-area: right; }
        #shoot { 
            grid-area: shoot; 
            background: linear-gradient(45deg, #ff0088, #cc0066);
            border-color: #ff0088;
            color: #fff;
            font-size: 1.3rem;
        }

        #shoot:active {
            background: linear-gradient(45deg, #ff4488, #ee2277);
        }

        /* Progress Bar */
        #progressBar {
            width: 80%;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        #progressFill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #44ffaa);
            width: 0%;
            transition: width 0.1s ease;
            box-shadow: 0 0 10px #00ff88;
        }

        @media (max-width: 480px) {
            .control-btn {
                width: 60px;
                height: 60px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- Loading Screen -->
        <div id="loadingScreen" class="screen active">
            <h1>NEON BATTLE</h1>
            <div id="progressBar">
                <div id="progressFill"></div>
            </div>
            <p>Loading...</p>
        </div>

        <!-- Lobby Screen -->
        <div id="lobbyScreen" class="screen">
            <h1>BATTLE ROYALE</h1>
            <div class="input-group">
                <input type="text" id="playerName" placeholder="Enter your name" maxlength="12">
            </div>
            <button class="btn" id="startBtn">START BATTLE</button>
        </div>

        <!-- Game Canvas -->
        <canvas id="canvas"></canvas>

        <!-- Game UI Overlay -->
        <div id="gameUI">
            <div id="healthBar" class="hud">
                <div>HEALTH</div>
                <div style="width: 100px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 5px;">
                    <div id="healthFill" style="height: 100%; background: linear-gradient(90deg, #ff4444, #ff8888); width: 100%; transition: width 0.3s ease; border-radius: 4px;"></div>
                </div>
                <div id="healthText" style="margin-top: 5px;">100/100</div>
            </div>
            <div id="stats" class="hud">
                <div id="killCounter">Kills: 0</div>
                <div id="timer">Time: 0s</div>
            </div>
            <div id="crosshair">
                <div class="crosshair-line horizontal"></div>
                <div class="crosshair-line vertical"></div>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls">
            <button id="up" class="control-btn">↑</button>
            <button id="down" class="control-btn">↓</button>
            <button id="left" class="control-btn">←</button>
            <button id="right" class="control-btn">→</button>
            <button id="shoot" class="control-btn">SHOOT</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen">
            <h1>GAME OVER</h1>
            <div style="background: rgba(0,0,0,0.8); padding: 2rem; border-radius: 15px; border: 2px solid #ff4444; margin-bottom: 2rem; text-align: center;">
                <div id="finalScore" style="font-size: 1.5rem; margin-bottom: 1rem;">Score: 0</div>
                <div id="finalKills" style="font-size: 1.2rem; margin-bottom: 1rem;">Kills: 0</div>
                <div id="finalTime" style="font-size: 1.2rem;">Time: 0s</div>
            </div>
            <button class="btn" id="restartBtn" style="margin-right: 1rem;">RESTART</button>
            <button class="btn" id="lobbyBtn" style="background: linear-gradient(45deg, #ff8844, #ff6644);">LOBBY</button>
        </div>
    </div>

    <script>
        // ==================== GAME STATE ====================
        const gameState = {
            currentScreen: 'loading',
            playerName: 'Player',
            gameRunning: false,
            gameTime: 0,
            kills: 0,
            score: 0,
            lastUpdate: 0,
            fadeTransition: false,
            fadeProgress: 0
        };

        // ==================== CANVAS SETUP ====================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ==================== PLAYER SYSTEM ====================
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: 0,
            vy: 0,
            radius: 20,
            health: 100,
            maxHealth: 100,
            lastShot: 0,
            shootDirection: { x: 0, y: -1 }, // Default up
            color: '#00ff88'
        };

        // ==================== ENEMY SYSTEM ====================
        const enemies = [];
        const enemySpawnTimer = 0;
        const BULLET_SPEED = 6;
        const PLAYER_SPEED = 2.5;
        const FIRE_RATE = 300;
        const ENEMY_COUNT = 6;
        const ENEMY_DAMAGE = 5;
        const CHASE_DISTANCE = 150;

        class Enemy {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 18;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.health = 3;
                this.lastDamage = 0;
                this.color = `hsl(${200 + Math.random() * 60}, 70%, 50%)`;
            }

            update(deltaTime) {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < CHASE_DISTANCE) {
                    // Chase player
                    const speed = 1.5;
                    this.vx = (dx / dist) * speed;
                    this.vy = (dy / dist) * speed;
                } else {
                    // Random movement
                    this.vx += (Math.random() - 0.5) * 0.5;
                    this.vy += (Math.random() - 0.5) * 0.5;
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                }

                // Boundary collision
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x + this.vx));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y + this.vy));

                // Damage player if touching
                if (dist < player.radius + this.radius && Date.now() - this.lastDamage > 1000) {
                    player.health -= ENEMY_DAMAGE;
                    this.lastDamage = Date.now();
                    updateHealthUI();
                }
            }

            takeDamage() {
                this.health--;
                if (this.health <= 0) {
                    gameState.kills++;
                    gameState.score += 100;
                    return true; // Dead
                }
                return false;
            }
        }

        // ==================== BULLET SYSTEM ====================
        const bullets = [];

        class Bullet {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx * BULLET_SPEED;
                this.vy = vy * BULLET_SPEED;
                this.radius = 4;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Boundary check
                return this.x > 0 && this.x < canvas.width && 
                       this.y > 0 && this.y < canvas.height;
            }
        }

        // ==================== INPUT SYSTEM ====================
        const keys = {
            up: false, down: false, left: false, right: false, shoot: false
        };

        // Touch controls
        function setupControls() {
            const controls = ['up', 'down', 'left', 'right', 'shoot'];
            controls.forEach(id => {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    keys[id] = true;
                });
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    keys[id] = false;
                });
                // Prevent scrolling
                btn.addEventListener('touchmove', (e) => e.preventDefault());
            });
        }

        // ==================== COLLISION SYSTEM ====================
        function checkCollisions() {
            // Bullet vs Enemy
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const dx = bullet.x - enemy.x;
                    const dy = bullet.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < bullet.radius + enemy.radius) {
                        if (enemy.takeDamage()) {
                            enemies.splice(j, 1);
                        }
                        bullets.splice(i, 1);
                        break;
                    }
                }
            }
        }

        // ==================== UI SYSTEM ====================
        function updateHealthUI() {
            const healthPercent = (player.health / player.maxHealth) * 100;
            const healthFill = document.getElementById('healthFill');
            const healthText = document.getElementById('healthText');
            
            healthFill.style.width = healthPercent + '%';
            if (healthPercent > 60) {
                healthFill.style.background = 'linear-gradient(90deg, #44ff44, #88ff88)';
            } else if (healthPercent > 30) {
                healthFill.style.background = 'linear-gradient(90deg, #ffaa00, #ffcc44)';
            } else {
                healthFill.style.background = 'linear-gradient(90deg, #ff4444, #ff8888)';
            }
            healthText.textContent = `${Math.max(0, Math.floor(player.health))}/${player.maxHealth}`;
        }

        function updateStatsUI() {
            document.getElementById('killCounter').textContent = `Kills: ${gameState.kills}`;
            document.getElementById('timer').textContent = `Time: ${Math.floor(gameState.gameTime)}s`;
        }

        // ==================== SCREEN MANAGEMENT ====================
        const screens = {
            loading: document.getElementById('loadingScreen'),
            lobby: document.getElementById('lobbyScreen'),
            game: document.getElementById('gameUI'),
            gameOver: document.getElementById('gameOverScreen')
        };

        function showScreen(screenName) {
            Object.values(screens).forEach(screen => {
                screen.classList.remove('active');
            });
            screens[screenName].classList.add('active');
            gameState.currentScreen = screenName;
        }

        // ==================== RENDERING SYSTEM ====================
        function render() {
            // Clear canvas with trail effect
            ctx.fillStyle = 'rgba(0, 0, 17, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw arena boundary
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ff88';
            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
            ctx.shadowBlur = 0;

            // Player
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Direction indicator
            ctx.strokeStyle = player.shootDirection.x === 0 && player.shootDirection.y === -1 ? '#ffffff' : '#ffffff66';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, -player.radius);
            ctx.lineTo(0, -player.radius - 15);
            ctx.stroke();

            // Player body with glow
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, player.radius);
            gradient.addColorStop(0, player.color);
            gradient.addColorStop(0.7, player.color + '88');
            gradient.addColorStop(1, 'transparent');
            
            ctx.shadowBlur = 25;
            ctx.shadowColor = player.color;
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();

            // Bullets
            bullets.forEach(bullet => {
                ctx.save();
                ctx.translate(bullet.x, bullet.y);
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ff88';
                
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, bullet.radius * 2);
                glowGradient.addColorStop(0, '#00ff88');
                glowGradient.addColorStop(0.5, '#00ff88aa');
                glowGradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, bullet.radius * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            });

            // Enemies
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                
                // Health indicator
                if (enemy.health < 3) {
                    ctx.fillStyle = `rgba(255, 255, 255, 0.3)`;
                    ctx.fillRect(-enemy.radius, -enemy.radius - 12, enemy.radius * 2, 4);
                    ctx.fillStyle = '#ff4444';
                    ctx.fillRect(-enemy.radius, -enemy.radius - 12, (enemy.health / 3) * enemy
